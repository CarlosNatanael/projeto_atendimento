{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>Registrar Atendimento</h2>
    <form method="POST">
        <div class="form-group">
            <label>Nome/Cliente:</label>
            <input type="text" name="cliente" required placeholder="Ex: Carlos Silva">
        </div>
        
        <div class="form-group">
            <label>Telefone/Celular:</label>
            <input type="text" name="telefone" required placeholder="(11) 99999-9999">
        </div>

        <div class="form-group">
            <label>Produto:</label>
            <input type="text" name="produto" required placeholder="Ex: Impressora L3150">
        </div>

        <div class="form-group">
            <label>Assunto:</label>
            <select name="assunto" required>
                <option value="" disabled selected>Selecione o assunto...</option>
                <option value="Automação">Automação</option>
                <option value="Áudio">Áudio</option>
            </select>
        </div>

        <div class="form-group">
            <label>Dúvida:</label>
            <textarea name="duvida" rows="4" required></textarea>
        </div>


        <div class="form-group">
            <label>Atendido por:</label>
            <select name="atendente" required>
                <option value="" disabled selected>Selecione o atendente</option>
                {% for atendente in atendentes %}
                <option value="{{ atendente }}">{{ atendente }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn-submit">Salvar Registro</button>
    </form>
</div>
{% endblock %}
