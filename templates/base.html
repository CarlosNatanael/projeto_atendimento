<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Atendimento</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='processor.png') }}" type="image/png">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">Suporte Técnico</a>
            <ul class="nav-links">
                <li><a href="/">Nova Entrada</a></li>
                <li><a href="/consulta">Consultar</a></li>
                <li>
                    <button id="theme-toggle" class="theme-btn">
                        <span id="theme-icon">🌙</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 - Controle de Atendimentos</p>
    </footer>
    <script>
        const btn = document.getElementById("theme-toggle");
        const icon = document.getElementById("theme-icon");
        const currentTheme = localStorage.getItem("theme");

        // Verifica se o usuário já tinha uma preferência salva
        if (currentTheme === "dark") {
            document.body.classList.add("dark-mode");
            icon.textContent = "☀️";
        }

        btn.addEventListener("click", function() {
            document.body.classList.toggle("dark-mode");

            let theme = "light";
            if (document.body.classList.contains("dark-mode")) {
                theme = "dark";
                icon.textContent = "☀️";
            } else {
                icon.textContent = "🌙";
            }

            // Salva a escolha para a próxima visita
            localStorage.setItem("theme", theme);
        });
    </script>
</body>
</html>
